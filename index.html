<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台铃 BLE 控车</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; max-width: 600px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 1.4em; color: #00d4ff; }
    .section { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .section h2 { font-size: 0.9em; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .row label { min-width: 60px; font-size: 0.85em; color: #aaa; }
    .row span { font-weight: bold; }
    select { background: #0f3460; color: #eee; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; font-size: 0.9em; }
    button { background: #0f3460; color: #00d4ff; border: 1px solid #00d4ff33; border-radius: 8px; padding: 10px 16px; font-size: 0.9em; cursor: pointer; transition: all 0.2s; }
    button:hover:not(:disabled) { background: #00d4ff22; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .cmd-btn { padding: 14px 8px; font-size: 0.95em; }
    .cmd-btn[data-cmd="02"], .cmd-btn[data-cmd="06"] { border-color: #00ff8855; color: #00ff88; }
    .cmd-btn[data-cmd="01"], .cmd-btn[data-cmd="07"] { border-color: #ff444455; color: #ff4444; }
    .cmd-btn[data-cmd="08"] { border-color: #ffaa0055; color: #ffaa00; }
    textarea { width: 100%; height: 150px; background: #0a0a1a; color: #0f0; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 0.75em; resize: vertical; }
    .state-disconnected { color: #ff4444; }
    .state-connecting { color: #ffaa00; }
    .state-connected { color: #00d4ff; }
    .state-authenticated { color: #00ff88; }
    .conn-btns { display: flex; gap: 8px; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status-item { background: #0f3460; border-radius: 8px; padding: 10px; text-align: center; }
    .status-item .val { font-size: 1.2em; font-weight: bold; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>台铃 BLE 控车</h1>

  <div class="section">
    <h2>连接</h2>
    <div class="row">
      <label>型号</label>
      <select id="model-select">
        <option value="KKS">KKS (默认)</option>
        <option value="BB">BB (保镖)</option>
        <option value="AX">AX (安芯)</option>
        <option value="JD">JD (极大)</option>
        <option value="HJ">HJ (宏基)</option>
        <option value="JW">JW/C39</option>
        <option value="XL">XL (西联)</option>
        <option value="YY">YY (亿源)</option>
      </select>
    </div>
    <div class="row">
      <label>状态</label>
      <span id="conn-state" class="state-disconnected">未连接</span>
    </div>
    <div class="row">
      <label>设备</label>
      <span id="device-name">-</span>
    </div>
    <div class="row">
      <label>Token</label>
      <span id="token-val" style="font-family:monospace">-</span>
    </div>
    <div class="conn-btns">
      <button id="btn-scan">扫描连接</button>
      <button id="btn-scan-all">扫描全部</button>
      <button id="btn-diagnose">诊断</button>
      <button id="btn-disconnect">断开</button>
    </div>
  </div>

  <div class="section">
    <h2>车辆状态</h2>
    <div class="status-grid">
      <div class="status-item"><div class="label">电压</div><div class="val" id="voltage-val">-</div></div>
      <div class="status-item"><div class="label">防盗</div><div class="val" id="lock-state">-</div></div>
      <div class="status-item"><div class="label">电源</div><div class="val" id="power-state">-</div></div>
      <div class="status-item"><div class="label">电量</div><div class="val" id="battery-val">-</div></div>
    </div>
  </div>

  <div class="section">
    <h2>控制</h2>
    <div class="btn-row">
      <button class="cmd-btn" data-cmd="01" disabled>设防</button>
      <button class="cmd-btn" data-cmd="02" disabled>解防</button>
      <button class="cmd-btn" data-cmd="08" disabled>寻车</button>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="cmd-btn" data-cmd="06" disabled>上电</button>
      <button class="cmd-btn" data-cmd="07" disabled>断电</button>
      <button class="cmd-btn" data-cmd="05" disabled>开坐垫</button>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="cmd-btn" data-cmd="0D" disabled>读状态</button>
      <button class="cmd-btn" data-cmd="0E" disabled>读防盗</button>
      <button disabled style="visibility:hidden"></button>
    </div>
  </div>

  <div class="section">
    <h2>原始发送</h2>
    <div class="row">
      <select id="char-select" style="width:80px">
        <option value="fe02">fe02</option>
        <option value="fcc1">fcc1</option>
      </select>
      <input id="hex-input" type="text" placeholder="Hex 数据 (如 A700000A1001...)" style="flex:1;background:#0f3460;color:#eee;border:1px solid #333;border-radius:6px;padding:6px 10px;font-family:monospace;font-size:0.85em" />
      <button id="btn-send-raw">发送</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="btn-qgj-login" style="font-size:0.85em">QGJ 登录 (默认密码)</button>
    </div>
  </div>

  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="margin:0">日志</h2>
      <div style="display:flex;gap:6px">
        <button id="btn-copy-log" style="padding:4px 10px;font-size:0.8em">复制</button>
        <button id="btn-clear-log" style="padding:4px 10px;font-size:0.8em">清空</button>
      </div>
    </div>
    <textarea id="log" readonly></textarea>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
