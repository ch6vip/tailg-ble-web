<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="台铃车辆移动端控制台，支持云端智联、蓝牙直连、车辆状态查看和常用控车。" />
  <meta name="theme-color" content="#09110f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="台铃智控" />
  <title>台铃智控</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='10' fill='%2309100f'/%3E%3Cpath d='M6 20h20l-2.5-6.1A4.6 4.6 0 0 0 19.2 11h-6.4a4.6 4.6 0 0 0-4.3 2.9L6 20Z' fill='%23f8f1df'/%3E%3Ccircle cx='11' cy='22' r='2.1' fill='%2318b7a4'/%3E%3Ccircle cx='21' cy='22' r='2.1' fill='%23e79022'/%3E%3C/svg%3E" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="lock-screen" id="lock-screen">
    <div class="lock-box">
      <span class="lock-kicker">TAILG CONTROL</span>
      <h2>安全验证</h2>
      <input id="lock-pwd" type="password" placeholder="输入访问密码" autocomplete="current-password" />
      <button id="lock-btn">进入控车台</button>
      <div class="error" id="lock-error">密码验证失败</div>
    </div>
  </div>

  <main class="app is-hidden">
    <header class="topbar">
      <div class="brand">
        <small>TAILG CONTROL</small>
        <strong>智能中控</strong>
      </div>
      <div class="connect-pill" id="topbar-status">
        <span class="dot" id="cloud-dot"></span>
        <span id="cloud-state">离线</span>
      </div>
    </header>

    <section class="hero-card" aria-label="车辆总览">
      <div class="hero-head">
        <div>
          <small>当前车辆</small>
          <div class="hero-title-row">
            <h1 id="vehicle-title">台铃智控车</h1>
            <span class="online-badge" id="online-badge">离线</span>
          </div>
        </div>
        <div class="tabs mode-switch" aria-label="控制模式">
          <button class="tab active" id="tab-cloud" type="button">云端</button>
          <button class="tab" id="tab-ble" type="button">蓝牙</button>
        </div>
      </div>

      <div class="hero-battery" id="hero-battery">
        <svg class="hero-battery-icon" width="28" height="14" viewBox="0 0 28 14" fill="none" aria-hidden="true">
          <rect x="0.5" y="0.5" width="24" height="13" rx="2.5" stroke="currentColor" stroke-opacity="0.6"/>
          <rect id="battery-fill-bar" x="2" y="2" width="0" height="10" rx="1.5" fill="currentColor"/>
          <path d="M25.5 4.5v5a2 2 0 0 0 0-5Z" fill="currentColor" fill-opacity="0.6"/>
        </svg>
        <span class="hero-battery-val" id="hero-battery-val">--%</span>
        <span class="hero-battery-sep">&middot;</span>
        <span class="hero-mileage-val" id="hero-mileage-val"></span>
      </div>

      <div class="car-visual" aria-hidden="true">
        <img id="car-photo" src="" alt="" />
      </div>

      <div class="hero-status-row">
        <span class="hero-status-pill" id="hero-status-pill">
          <span id="hero-defence-text">--</span>
          <span class="hero-status-dot"></span>
          <span id="hero-power-text">--</span>
        </span>
      </div>

      <div class="sr-only" aria-hidden="true">
        <strong id="lock-state">-</strong>
        <strong id="power-state">-</strong>
        <strong id="conn-state" class="state-disconnected">未连接</strong>
      </div>
    </section>

    <section class="sheet">
      <div class="dashboard">
        <div class="dash-box metric accent">
          <div class="label">电池余量</div>
          <div class="val" id="battery-val">--</div>
          <small class="metric-hint">登录或连接后更新</small>
        </div>
        <div class="dash-box metric">
          <div class="label">实时电压</div>
          <div class="val" id="voltage-val">--</div>
          <small class="metric-hint">等待车辆回传</small>
        </div>
      </div>

      <div class="section-title">
        <div>
          <small>常用操作</small>
          <h2>常用控车</h2>
        </div>
        <small>危险动作谨慎操作</small>
      </div>

      <section class="control-card card" aria-label="控车命令">
        <div class="ctrl-grid">
          <button class="ctrl-btn green cmd-btn" data-cmd="02" disabled type="button">
            <span class="icon">开</span><span class="text">解防解锁</span>
          </button>
          <button class="ctrl-btn green cmd-btn" data-cmd="06" disabled type="button">
            <span class="icon">电</span><span class="text">一键上电</span>
          </button>
          <button class="ctrl-btn yellow cmd-btn" data-cmd="08" disabled type="button">
            <span class="icon">鸣</span><span class="text">寻车鸣笛</span>
          </button>
          <button class="ctrl-btn red cmd-btn" data-cmd="01" disabled type="button">
            <span class="icon">锁</span><span class="text">安全设防</span>
          </button>
          <button class="ctrl-btn red cmd-btn" data-cmd="07" disabled type="button">
            <span class="icon">停</span><span class="text">切断电门</span>
          </button>
          <button class="ctrl-btn blue cmd-btn" data-cmd="05" disabled type="button">
            <span class="icon">座</span><span class="text">打开坐垫</span>
          </button>
        </div>
      </section>

      <div class="feedback" data-state="Idle" aria-live="polite">
        <div class="progress"></div>
        <div>
          <strong id="command-feedback-title">等待控车指令</strong>
          <span id="command-feedback-text">连接车辆或登录云端后即可使用常用控车。</span>
        </div>
        <strong id="command-feedback-mark">Idle</strong>
      </div>

      <button class="connection-toggle" id="connection-toggle" type="button">连接设置 展开</button>

      <div class="connection-drawer" id="connection-drawer">
        <section class="panel active connect-panel" id="panel-cloud">
          <div class="card panel-card">
            <div class="panel-title">
              <div>
                <small>云端连接</small>
                <h2>云端智联</h2>
              </div>
              <span>验证码登录</span>
            </div>
            <div class="cloud-login-form" id="cloud-login-form">
              <div class="form-row">
              <input id="phone-input" class="form-input" type="tel" inputmode="tel" autocomplete="tel" maxlength="11" placeholder="手机号码" />
                <button id="btn-get-code" class="btn" type="button">获取验证码</button>
              </div>
              <div class="form-row">
              <input id="sms-input" class="form-input" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="短信验证码" />
                <button id="btn-cloud-login" class="btn btn-primary" type="button">验证登录</button>
              </div>
            </div>
            <div class="cloud-session is-hidden" id="cloud-session">
              <span>云端登录已恢复，选择车辆后即可控车。</span>
              <button id="btn-cloud-logout" class="btn" type="button">断开连接</button>
            </div>
            <div id="car-list" class="car-list"></div>
          </div>
        </section>

        <section class="panel connect-panel" id="panel-ble">
          <div class="card panel-card">
            <div class="panel-title">
              <div>
                <small>蓝牙连接</small>
                <h2>蓝牙直连</h2>
              </div>
              <span id="device-name">-</span>
            </div>
            <div class="empty-note" id="ble-support-note"></div>
            <div class="ble-row">
              <label>车辆协议</label>
              <select id="model-select" aria-label="车辆协议">
                <option value="KKS">KKS (默认主控)</option>
                <option value="BB">BB (保镖)</option>
                <option value="AX">AX (安芯)</option>
                <option value="JD">JD (极大)</option>
                <option value="HJ">HJ (宏基)</option>
                <option value="JW">JW / C39</option>
                <option value="XL">XL (西联)</option>
                <option value="YY">YY (亿源)</option>
              </select>
            </div>
            <div class="ble-row token-row">
              <label>握手令牌</label>
              <span id="token-val">-</span>
            </div>
            <div class="ble-btns">
              <button id="btn-scan" class="btn btn-primary" type="button">快连配对</button>
              <button id="btn-scan-all" class="btn" type="button">全频扫描</button>
              <button id="btn-diagnose" class="btn" type="button">深度诊断</button>
              <button id="btn-disconnect" class="btn" type="button">切断连接</button>
            </div>
          </div>
        </section>
        <button class="drawer-debug-link" id="drawer-debug-link" type="button">打开工程调试</button>
      </div>

      <button class="advanced-toggle" id="advanced-toggle" type="button">工程调试面板 展开</button>

      <section class="advanced-panel debug-drawer" id="advanced-panel">
        <div class="card">
          <div class="panel-title">
            <div>
              <small>工程模式</small>
              <h2>参数调试</h2>
            </div>
            <span>默认收起</span>
          </div>
          <div class="raw-row">
            <select id="char-select" class="form-input" aria-label="写入特征值">
              <option value="fe02">fe02</option>
              <option value="fcc1">fcc1</option>
            </select>
            <input id="hex-input" class="form-input raw-input" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="Hex Code..." />
            <button id="btn-send-raw" class="btn" type="button">TX</button>
          </div>
          <div class="raw-row">
            <button id="btn-qgj-login" class="btn" type="button">QGJ 授权</button>
            <button class="btn cmd-btn" data-cmd="0D" disabled type="button">状态帧</button>
            <button class="btn cmd-btn" data-cmd="0E" disabled type="button">防盗帧</button>
          </div>
          <div class="log-header">
            <span>终端日志</span>
            <div>
              <button id="btn-copy-log" class="btn mini" type="button">复制</button>
              <button id="btn-clear-log" class="btn mini" type="button">清空</button>
            </div>
          </div>
          <textarea id="log" readonly placeholder="Awaiting telemetry..."></textarea>
        </div>
      </section>

      <div class="floating">
        <span id="quick-status">连接车辆后即可控车</span>
        <div class="floating-actions">
          <button type="button" id="quick-connect">连接</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
