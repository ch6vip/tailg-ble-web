<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="台铃车辆移动端控制台，支持云端智联、蓝牙直连、车辆状态查看和常用控车。" />
  <meta name="theme-color" content="#09110f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="台铃智控" />
  <title>台铃智控</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='10' fill='%2309100f'/%3E%3Cpath d='M6 20h20l-2.5-6.1A4.6 4.6 0 0 0 19.2 11h-6.4a4.6 4.6 0 0 0-4.3 2.9L6 20Z' fill='%23f8f1df'/%3E%3Ccircle cx='11' cy='22' r='2.1' fill='%2318b7a4'/%3E%3Ccircle cx='21' cy='22' r='2.1' fill='%23e79022'/%3E%3C/svg%3E" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="icon-unlock" viewBox="0 0 24 24">
      <path d="M7 10V7a5 5 0 0 1 9.1-2.9" />
      <rect x="5" y="10" width="14" height="10" rx="2" />
      <path d="M12 14v2" />
    </symbol>
    <symbol id="icon-power" viewBox="0 0 24 24">
      <path d="M12 2v10" />
      <path d="M18.4 6.6a8 8 0 1 1-12.8 0" />
    </symbol>
    <symbol id="icon-bell" viewBox="0 0 24 24">
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9" />
      <path d="M10 21h4" />
      <path d="M4 3 2 5" />
      <path d="M20 3 22 5" />
    </symbol>
    <symbol id="icon-lock" viewBox="0 0 24 24">
      <rect x="5" y="10" width="14" height="10" rx="2" />
      <path d="M8 10V7a4 4 0 0 1 8 0v3" />
      <path d="M12 14v2" />
    </symbol>
    <symbol id="icon-power-off" viewBox="0 0 24 24">
      <path d="M12 2v8" />
      <path d="m5 5 14 14" />
      <path d="M18.4 6.6a8 8 0 0 1-1.3 11.2" />
      <path d="M6.9 17.8A8 8 0 0 1 5.6 6.6" />
    </symbol>
    <symbol id="icon-seat" viewBox="0 0 24 24">
      <path d="M5 11V7a3 3 0 0 1 3-3h4" />
      <path d="M5 11h10a4 4 0 0 1 4 4v1H8a3 3 0 0 1-3-3v-2Z" />
      <path d="M8 20v-4" />
      <path d="M18 20v-4" />
    </symbol>
    <symbol id="icon-chevron" viewBox="0 0 24 24">
      <path d="m6 9 6 6 6-6" />
    </symbol>
  </svg>
  <div class="lock-screen" id="lock-screen">
    <div class="lock-box">
      <span class="lock-kicker">TAILG CONTROL</span>
      <h2>安全验证</h2>
      <input id="lock-pwd" type="password" placeholder="输入访问密码" autocomplete="current-password" />
      <button id="lock-btn">进入控车台</button>
      <div class="error" id="lock-error">密码验证失败</div>
    </div>
  </div>

  <main class="app is-hidden">
    <header class="topbar">
      <div class="brand">
        <small>TAILG CONTROL</small>
        <strong>智能中控</strong>
      </div>
      <div class="connect-pill" id="topbar-status">
        <span class="dot" id="cloud-dot"></span>
        <span id="cloud-state">离线</span>
      </div>
    </header>

    <section class="hero-card" aria-label="车辆总览">
      <div class="hero-head">
        <div>
          <small>当前车辆</small>
          <h1 id="vehicle-title">台铃智控车</h1>
        </div>
      </div>

      <div class="car-visual" aria-hidden="true">
        <img id="car-photo" src="" alt="" />
        <div class="vehicle-fallback">
          <span class="fallback-body"></span>
          <span class="fallback-handle"></span>
          <span class="fallback-wheel front"></span>
          <span class="fallback-wheel rear"></span>
        </div>
      </div>

      <div class="hero-metrics" id="hero-battery">
        <div class="metric-card battery-card">
          <span class="metric-label">电池</span>
          <div class="battery-meter" aria-hidden="true">
            <span id="battery-fill-bar"></span>
          </div>
          <strong id="hero-battery-val">--%</strong>
        </div>
        <div class="metric-card">
          <span class="metric-label">电压</span>
          <strong id="hero-voltage-val">--V</strong>
        </div>
        <div class="metric-card">
          <span class="metric-label">续航</span>
          <strong id="hero-mileage-val">--</strong>
        </div>
      </div>

      <div class="hero-status-row">
        <span class="hero-status-pill" id="hero-status-pill">
          <span id="hero-defence-text">--</span>
          <span class="hero-status-dot"></span>
          <span id="hero-power-text">--</span>
        </span>
      </div>

    </section>

    <section class="sheet">
      <div class="section-title">
        <h2>常用控车</h2>
        <small>危险动作谨慎操作</small>
      </div>

      <section class="control-card card" aria-label="控车命令">
        <div class="ctrl-grid">
          <button class="ctrl-btn green cmd-btn" data-cmd="02" disabled type="button" aria-label="解防解锁">
            <span class="icon"><svg><use href="#icon-unlock"></use></svg></span><span class="text">解防</span>
          </button>
          <button class="ctrl-btn green cmd-btn" data-cmd="06" disabled type="button" aria-label="一键上电">
            <span class="icon"><svg><use href="#icon-power"></use></svg></span><span class="text">上电</span>
          </button>
          <button class="ctrl-btn yellow cmd-btn" data-cmd="08" disabled type="button" aria-label="寻车鸣笛">
            <span class="icon"><svg><use href="#icon-bell"></use></svg></span><span class="text">寻车</span>
          </button>
          <button class="ctrl-btn red cmd-btn" data-cmd="01" disabled type="button" aria-label="长按安全设防">
            <span class="icon"><svg><use href="#icon-lock"></use></svg></span><span class="text">设防</span>
          </button>
          <button class="ctrl-btn red cmd-btn" data-cmd="07" disabled type="button" aria-label="长按切断电门">
            <span class="icon"><svg><use href="#icon-power-off"></use></svg></span><span class="text">断电</span>
          </button>
          <button class="ctrl-btn blue cmd-btn" data-cmd="05" disabled type="button" aria-label="打开坐垫">
            <span class="icon"><svg><use href="#icon-seat"></use></svg></span><span class="text">坐垫</span>
          </button>
        </div>
      </section>

      <div class="feedback" data-state="Idle" aria-live="polite">
        <div class="progress"></div>
        <div>
          <strong id="command-feedback-title">等待控车指令</strong>
          <span id="command-feedback-text">连接车辆或登录云端后即可使用常用控车。</span>
        </div>
        <strong id="command-feedback-mark" class="sr-only">Idle</strong>
      </div>

      <button class="connection-toggle" id="connection-toggle" type="button">
        <span>连接设置</span>
        <strong>展开</strong>
        <svg aria-hidden="true"><use href="#icon-chevron"></use></svg>
      </button>

      <div class="connection-drawer" id="connection-drawer">
        <div class="tabs mode-switch" aria-label="控制模式">
          <button class="tab active" id="tab-cloud" type="button">云端</button>
          <button class="tab" id="tab-ble" type="button">蓝牙</button>
        </div>
        <section class="panel active connect-panel" id="panel-cloud">
          <div class="card panel-card">
            <div class="panel-title">
              <div>
                <small>云端连接</small>
                <h2>云端智联</h2>
              </div>
              <span>验证码登录</span>
            </div>
            <div class="cloud-login-form" id="cloud-login-form">
              <div class="form-row">
                <input id="phone-input" class="form-input" type="tel" inputmode="tel" autocomplete="tel" maxlength="11" placeholder="手机号码" />
                <button id="btn-get-code" class="btn" type="button">获取验证码</button>
              </div>
              <div class="form-row">
                <input id="sms-input" class="form-input" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="短信验证码" />
                <button id="btn-cloud-login" class="btn btn-primary" type="button">验证登录</button>
              </div>
            </div>
            <div class="cloud-session is-hidden" id="cloud-session">
              <span>云端登录已恢复，选择车辆后即可控车。</span>
              <button id="btn-cloud-logout" class="btn" type="button">断开连接</button>
            </div>
            <div id="car-list" class="car-list"></div>
          </div>
        </section>

        <section class="panel connect-panel" id="panel-ble">
          <div class="card panel-card">
            <div class="panel-title">
              <div>
                <small>蓝牙连接</small>
                <h2>蓝牙直连</h2>
              </div>
              <span id="device-name">-</span>
            </div>
            <div class="empty-note" id="ble-support-note"></div>
            <div class="ble-row">
              <label>车辆协议</label>
              <select id="model-select" aria-label="车辆协议">
                <option value="KKS">KKS (默认主控)</option>
                <option value="BB">BB (保镖)</option>
                <option value="AX">AX (安芯)</option>
                <option value="JD">JD (极大)</option>
                <option value="HJ">HJ (宏基)</option>
                <option value="JW">JW / C39</option>
                <option value="XL">XL (西联)</option>
                <option value="YY">YY (亿源)</option>
              </select>
            </div>
            <div class="ble-row token-row">
              <label>握手令牌</label>
              <span id="token-val">-</span>
            </div>
            <div class="ble-btns">
              <button id="btn-scan" class="btn btn-primary" type="button">快连配对</button>
              <button id="btn-scan-all" class="btn" type="button">全频扫描</button>
              <button id="btn-diagnose" class="btn" type="button">深度诊断</button>
              <button id="btn-disconnect" class="btn" type="button">切断连接</button>
            </div>
          </div>
        </section>
        <button class="drawer-debug-link" id="drawer-debug-link" type="button">高级调试</button>
      </div>

      <section class="advanced-panel debug-drawer" id="advanced-panel">
        <div class="card">
          <div class="panel-title">
            <div>
              <small>工程模式</small>
              <h2>参数调试</h2>
            </div>
            <span>默认收起</span>
          </div>
          <div class="raw-row">
            <select id="char-select" class="form-input" aria-label="写入特征值">
              <option value="fe02">fe02</option>
              <option value="fcc1">fcc1</option>
            </select>
            <input id="hex-input" class="form-input raw-input" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="Hex Code..." />
            <button id="btn-send-raw" class="btn" type="button">TX</button>
          </div>
          <div class="raw-row">
            <button id="btn-qgj-login" class="btn" type="button">QGJ 授权</button>
            <button class="btn cmd-btn" data-cmd="0D" disabled type="button">状态帧</button>
            <button class="btn cmd-btn" data-cmd="0E" disabled type="button">防盗帧</button>
          </div>
          <div class="log-header">
            <span>终端日志</span>
            <div>
              <button id="btn-copy-log" class="btn mini" type="button">复制</button>
              <button id="btn-clear-log" class="btn mini" type="button">清空</button>
            </div>
          </div>
          <textarea id="log" readonly placeholder="Awaiting telemetry..."></textarea>
        </div>
      </section>

    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
